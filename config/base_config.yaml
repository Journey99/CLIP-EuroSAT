experiment:
  seed: 42
  device: cuda # mps, cpu
  num_workers: 4

model:
  clip_model: ViT-B/32
  freeze_vision: false
  freeze_text: true

data:
  data_dir: data/eurosat
  batch_size: 32
  val_split: 0.2
  test_split: 0.1

few_shot:
  shots_per_class: [1, 5, 10, 20]
  
lora:
  r: 8
  alpha: 16
  dropout: 0.1
  target_modules: ['q_proj', 'v_proj']

training:
  epochs: 50
  learning_rate: 1e-5
  weight_decay: 0.01
  warmup_steps: 500
  
logging:
  log_interval: 10
  save_interval: 5
  use_tensorboard: true  